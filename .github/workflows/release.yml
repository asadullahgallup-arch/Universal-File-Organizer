name: Build Windows release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build the application
        run: pyinstaller --noconfirm "Universal File Organizer.spec"

      - name: Create a team distribution ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Universal File Organizer/*" -DestinationPath "Universal_File_Organizer_${{ github.event.release.tag_name }}_Windows.zip"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ github.event.release.tag_name }}" installer.iss'

      - name: Attach the Windows app to this release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Automatically strip the leading 'v' from the tag name if it exists (e.g., v1.0.1 -> 1.0.1)
          $CleanVersion = "${{ github.event.release.tag_name }}".TrimStart('v')
          
          # Run the upload targeting the exact installer filename structure
          gh release upload "${{ github.event.release.tag_name }}" "Universal_File_Organizer_${{ github.event.release.tag_name }}_Windows.zip" "dist/Universal_File_Organizer_${CleanVersion}_Windows_Setup.exe" --clobber
