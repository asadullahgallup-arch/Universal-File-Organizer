name: Build Windows release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build the application
        run: pyinstaller --noconfirm "Universal File Organizer.spec"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ github.event.release.tag_name }}" installer.iss'

      - name: Attach the Windows app to this release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Dynamically search inside the project folder to locate the built installer exe
          $InstallerFile = Get-ChildItem -Path . -Filter "*Setup*.exe" -Recurse | Select-Object -First 1
          
          if ($InstallerFile) {
              Write-Host "Found installer at: $($InstallerFile.FullName)"
              # Upload ONLY the installation wizard file
              gh release upload "${{ github.event.release.tag_name }}" $InstallerFile.FullName --clobber
          } else {
              Write-Error "Could not find any compiled setup file ending with Setup.exe!"
              exit 1
          }
