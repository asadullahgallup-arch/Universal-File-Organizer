name: Build Windows release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write      # MANDATORY permission required for generating build attestations
  attestations: write  # MANDATORY permission required for writing build attestations

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build the application
        run: pyinstaller --noconfirm "Field_Operations_Toolkit.spec"

      - name: Ensure dist directory path alignment
        shell: pwsh
        run: |
          # 1. Target the dist directory
          $DistPath = "dist"
          
          # 2. Automatically find any compiled directory folder that PyInstaller generated
          $FoundFolder = Get-ChildItem -Path $DistPath -Directory | Select-Object -First 1
          
          if ($FoundFolder) {
              $TargetFolderName = "Field Operations Toolkit"
              $TargetFullPath = Join-Path $DistPath $TargetFolderName
              
              # 3. If the folder name doesn't match the space-separated requirement, clone it safely
              if ($FoundFolder.Name -ne $TargetFolderName) {
                  Write-Host "Aligning folder paths: Copying '$($FoundFolder.FullName)' to '$TargetFullPath'"
                  Copy-Item -Path $FoundFolder.FullName -Destination $TargetFullPath -Recurse -Force
              } else {
                  Write-Host "Folder structure already aligned perfectly."
              }
          } else {
              Write-Error "PyInstaller failed to output a built folder inside the dist directory!"
              exit 1
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ github.event.release.tag_name }}" installer.iss

      - name: Locate compiled installer path
        id: find-installer
        shell: pwsh
        run: |
          $InstallerFile = Get-ChildItem -Path . -Filter "*Setup*.exe" -Recurse | Select-Object -First 1
          if ($InstallerFile) {
              Write-Host "Found installer at: $($InstallerFile.FullName)"
              echo "INSTALLER_PATH=$($InstallerFile.FullName)" >> $env:GITHUB_ENV
          } else {
              Write-Error "Could not find any compiled setup file ending with Setup.exe!"
              exit 1
          }

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '${{ env.INSTALLER_PATH }}'

      - name: Attach the Windows app to this release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ env.INSTALLER_PATH }}" --clobber
